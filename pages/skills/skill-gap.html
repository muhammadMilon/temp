<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Skill Gap Analysis – SkillVoyager.AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { DEFAULT: '#4f46e5' } } } } }</script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors">
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="../../index.html" class="text-xl font-bold text-indigo-600 dark:text-indigo-400">SkillVoyager.AI</a>
        <div class="flex items-center gap-4">
          <a href="../dashboard/dashboard.html" class="text-slate-600 dark:text-slate-300 hover:text-indigo-600 dark:hover:text-indigo-400 transition">Dashboard</a>
          <button id="themeToggle" type="button" class="p-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition" aria-label="Toggle theme"></button>
        </div>
      </div>
    </div>
  </nav>
  <main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-12">
    <div class="rounded-2xl bg-white dark:bg-slate-900/80 border border-slate-200 dark:border-slate-800 shadow-xl p-8">
      <div class="text-center mb-8">
        <div class="text-5xl mb-4">🎯</div>
        <h2 class="text-3xl font-bold text-slate-900 dark:text-slate-100">AI Skill Gap Analysis</h2>
        <p class="text-slate-600 dark:text-slate-400 mt-2">Discover what skills you need for your career goals</p>
      </div>
      <form id="skillGapForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Current Skills</label>
          <textarea id="currentSkills" rows="4" placeholder="e.g. HTML, CSS, JavaScript..." class="w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-indigo-500"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Target Role</label>
          <input type="text" id="targetRole" placeholder="e.g. Senior Full Stack Developer" class="w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Industry</label>
          <select id="industry" class="w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100">
            <option>Web Development</option>
            <option>Data Science</option>
            <option>AI / Machine Learning</option>
          </select>
        </div>
        <button type="submit" class="w-full bg-indigo-600 dark:bg-indigo-500 text-white py-3 rounded-lg hover:bg-indigo-700 dark:hover:bg-indigo-600 font-semibold transition">Analyze with AI</button>
      </form>
      <div id="resultsSection" class="mt-8 hidden border-t border-slate-200 dark:border-slate-700 pt-8">
        <h3 class="text-xl font-bold mb-4 text-slate-900 dark:text-slate-100">Your Skill Gap Analysis</h3>
        <a href="../roadmaps/roadmap-generator.html" class="inline-block px-6 py-2.5 bg-indigo-600 dark:bg-indigo-500 text-white rounded-lg font-semibold transition">Generate Roadmap</a>
      </div>
    </div>
  </main>
  <footer class="py-6 px-4 border-t border-slate-200 dark:border-slate-800 text-center text-slate-500 dark:text-slate-400 text-sm">
    <p>SkillVoyager.AI</p>
  </footer>
  <script src="../../js/theme.js"></script>
</body>
</html>
