<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Assessment Quiz – SkillVoyager.AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { DEFAULT: '#4f46e5' } } } } }</script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors">
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="../../index.html" class="text-xl font-bold text-indigo-600 dark:text-indigo-400">SkillVoyager.AI</a>
        <div class="flex items-center gap-4">
          <a href="../dashboard/dashboard.html" class="text-slate-600 dark:text-slate-300 hover:text-indigo-600 dark:hover:text-indigo-400 transition">Dashboard</a>
          <button id="themeToggle" type="button" class="p-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition" aria-label="Toggle theme"></button>
        </div>
      </div>
    </div>
  </nav>
  <main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-12">
    <div class="rounded-2xl bg-white dark:bg-slate-900/80 border border-slate-200 dark:border-slate-800 shadow-xl p-8">
      <div class="text-center mb-8">
        <div class="text-5xl mb-4">📝</div>
        <h2 class="text-3xl font-bold text-slate-900 dark:text-slate-100">Skill Assessment Quiz</h2>
        <p class="text-slate-600 dark:text-slate-400 mt-2">JavaScript and React, 5 questions</p>
      </div>
      <div class="mb-6">
        <div class="flex justify-between text-sm text-slate-600 dark:text-slate-400 mb-2">
          <span>Question 1 of 5</span>
          <span>20%</span>
        </div>
        <div class="w-full h-2 rounded-full bg-slate-200 dark:bg-slate-700">
          <div class="h-2 rounded-full bg-indigo-600 dark:bg-indigo-500 w-1/5"></div>
        </div>
      </div>
      <form id="quizForm" class="space-y-6">
        <div>
          <h3 class="text-lg font-semibold text-slate-900 dark:text-slate-100 mb-4">What is the correct way to create state in React using hooks?</h3>
          <div class="space-y-3">
            <label class="flex items-center gap-3 p-4 rounded-lg border border-slate-300 dark:border-slate-600 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 transition">
              <input type="radio" name="q1" value="a" class="text-indigo-600">
              <span class="text-slate-700 dark:text-slate-300">this.state</span>
            </label>
            <label class="flex items-center gap-3 p-4 rounded-lg border border-slate-300 dark:border-slate-600 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 transition">
              <input type="radio" name="q1" value="b" class="text-indigo-600">
              <span class="text-slate-700 dark:text-slate-300">useState()</span>
            </label>
          </div>
        </div>
        <div class="flex gap-4">
          <button type="button" class="px-6 py-2.5 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 font-medium transition">Previous</button>
          <button type="submit" class="ml-auto px-6 py-2.5 bg-indigo-600 dark:bg-indigo-500 text-white rounded-lg hover:bg-indigo-700 dark:hover:bg-indigo-600 font-semibold transition">Next</button>
        </div>
      </form>
    </div>
  </main>
  <footer class="py-6 px-4 border-t border-slate-200 dark:border-slate-800 text-center text-slate-500 dark:text-slate-400 text-sm">
    <p>SkillVoyager.AI</p>
  </footer>
  <script src="../../js/theme.js"></script>
</body>
</html>
