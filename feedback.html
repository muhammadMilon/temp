<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rate & Feedback – SkillVoyager.AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <nav class="bg-gray-900/90 border-b border-gray-800 py-4 px-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="index.html" class="text-xl font-bold text-indigo-400">SkillVoyager.AI</a>
      <div class="flex gap-6">
        <a href="dashboard.html" class="text-gray-400 hover:text-indigo-400">Dashboard</a>
        <a href="roadmap.html" class="text-indigo-400">Roadmap</a>
      </div>
    </div>
  </nav>

  <main class="max-w-xl mx-auto px-4 py-12">
    <h1 class="text-2xl font-bold mb-2">Rate & Feedback</h1>
    <p class="text-gray-400 mb-8">Your feedback helps AI adapt your roadmap.</p>

    <form class="space-y-8">
      <div class="rounded-xl bg-gray-900/50 border border-gray-800 p-6">
        <label class="block font-semibold mb-4">Milestone: React Fundamentals</label>
        <p class="text-gray-400 text-sm mb-4">How useful was this milestone?</p>
        <div class="flex gap-4">
          <label class="cursor-pointer"><input type="radio" name="rating" class="sr-only peer"> <span class="px-4 py-2 rounded-lg bg-gray-800 peer-checked:bg-indigo-600 hover:bg-gray-700">1</span></label>
          <label class="cursor-pointer"><input type="radio" name="rating" class="sr-only peer"> <span class="px-4 py-2 rounded-lg bg-gray-800 peer-checked:bg-indigo-600 hover:bg-gray-700">2</span></label>
          <label class="cursor-pointer"><input type="radio" name="rating" class="sr-only peer"> <span class="px-4 py-2 rounded-lg bg-gray-800 peer-checked:bg-indigo-600 hover:bg-gray-700">3</span></label>
          <label class="cursor-pointer"><input type="radio" name="rating" class="sr-only peer"> <span class="px-4 py-2 rounded-lg bg-gray-800 peer-checked:bg-indigo-600 hover:bg-gray-700">4</span></label>
          <label class="cursor-pointer"><input type="radio" name="rating" class="sr-only peer"> <span class="px-4 py-2 rounded-lg bg-gray-800 peer-checked:bg-indigo-600 hover:bg-gray-700">5</span></label>
        </div>
      </div>
      <div>
        <label class="block font-semibold mb-2">Additional feedback (optional)</label>
        <textarea rows="4" placeholder="What worked? What could improve?" class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-gray-100 placeholder-gray-500 focus:border-indigo-500 outline-none resize-none"></textarea>
      </div>
      <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-semibold transition">Submit Feedback</button>
    </form>
  </main>
</body>
</html>
