<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – SkillVoyager.AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">
  <nav class="bg-gray-900/90 border-b border-gray-800 py-4 px-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="index.html" class="text-xl font-bold text-indigo-400">SkillVoyager.AI</a>
      <a href="login.html" class="text-gray-400 hover:text-indigo-400 transition">Login</a>
    </div>
  </nav>

  <main class="flex-1 flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-md">
      <h1 class="text-3xl font-bold text-center mb-2">Create your account</h1>
      <p class="text-gray-400 text-center mb-8">Start your AI-powered learning journey today</p>
      <form class="space-y-5 rounded-2xl bg-gray-900/50 border border-gray-800 p-8">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Name</label>
          <input type="text" placeholder="Your name" class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-gray-100 placeholder-gray-500 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
          <input type="email" placeholder="you@example.com" class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-gray-100 placeholder-gray-500 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
          <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-gray-100 placeholder-gray-500 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none">
        </div>
        <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-semibold transition">Create Account</button>
      </form>
      <p class="text-center text-gray-400 mt-6">Already have an account? <a href="login.html" class="text-indigo-400 hover:underline">Sign in</a></p>
    </div>
  </main>
</body>
</html>
