<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile – SkillVoyager.AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <nav class="bg-gray-900/90 border-b border-gray-800 py-4 px-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="index.html" class="text-xl font-bold text-indigo-400">SkillVoyager.AI</a>
      <div class="flex gap-6">
        <a href="dashboard.html" class="text-gray-400 hover:text-indigo-400">Dashboard</a>
        <a href="roadmap.html" class="text-gray-400 hover:text-indigo-400">Roadmap</a>
        <a href="quiz.html" class="text-gray-400 hover:text-indigo-400">Quiz</a>
        <a href="achievements.html" class="text-gray-400 hover:text-indigo-400">Achievements</a>
        <a href="profile.html" class="text-indigo-400">Profile</a>
      </div>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-4 py-12">
    <h1 class="text-3xl font-bold mb-8">Profile & Settings</h1>

    <div class="space-y-8">
      <section class="rounded-xl bg-gray-900/50 border border-gray-800 p-6">
        <h2 class="text-lg font-semibold mb-4">Account</h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm text-gray-400 mb-2">Name</label>
            <input type="text" value="Alex Learner" class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-gray-100 outline-none focus:border-indigo-500">
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-2">Email</label>
            <input type="email" value="alex@example.com" class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-gray-100 outline-none focus:border-indigo-500">
          </div>
        </div>
      </section>

      <section class="rounded-xl bg-gray-900/50 border border-gray-800 p-6">
        <h2 class="text-lg font-semibold mb-4">Career Goal</h2>
        <p class="text-gray-400 mb-4">Frontend Developer</p>
        <a href="#" class="text-indigo-400 hover:underline text-sm">Edit career goal</a>
      </section>

      <section class="rounded-xl bg-gray-900/50 border border-gray-800 p-6">
        <h2 class="text-lg font-semibold mb-4">Current Skills</h2>
        <div class="flex flex-wrap gap-2">
          <span class="px-3 py-1 rounded-full bg-indigo-600/20 text-indigo-400 text-sm">HTML</span>
          <span class="px-3 py-1 rounded-full bg-indigo-600/20 text-indigo-400 text-sm">CSS</span>
          <span class="px-3 py-1 rounded-full bg-indigo-600/20 text-indigo-400 text-sm">JavaScript</span>
          <span class="px-3 py-1 rounded-full bg-gray-700 text-gray-400 text-sm">+ Add</span>
        </div>
      </section>

      <button class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-semibold transition">Save Changes</button>
    </div>
  </main>
</body>
</html>
