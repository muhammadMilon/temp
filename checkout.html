<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout – SkillVoyager.AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <nav class="bg-gray-900/90 border-b border-gray-800 py-4 px-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="index.html" class="text-xl font-bold text-indigo-400">SkillVoyager.AI</a>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-4 py-12">
    <h1 class="text-2xl font-bold mb-8">Checkout</h1>

    <div class="rounded-xl bg-gray-900/50 border border-gray-800 p-6 mb-8">
      <h2 class="font-semibold mb-4">Order Summary</h2>
      <div class="flex justify-between py-2 border-b border-gray-800">
        <span class="text-gray-400">React Masterclass</span>
        <span class="font-medium">$49.99</span>
      </div>
      <div class="flex justify-between py-2 text-indigo-400">
        <span>Total</span>
        <span class="font-bold">$49.99</span>
      </div>
    </div>

    <form class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
        <input type="email" placeholder="you@example.com" class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-gray-100 placeholder-gray-500 focus:border-indigo-500 outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Card number</label>
        <input type="text" placeholder="4242 4242 4242 4242" class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-gray-100 placeholder-gray-500 focus:border-indigo-500 outline-none">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Expiry</label>
          <input type="text" placeholder="MM/YY" class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-gray-100 placeholder-gray-500 focus:border-indigo-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">CVC</label>
          <input type="text" placeholder="123" class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-gray-100 placeholder-gray-500 focus:border-indigo-500 outline-none">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Billing name</label>
        <input type="text" placeholder="Full name" class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-gray-100 placeholder-gray-500 focus:border-indigo-500 outline-none">
      </div>
      <button type="submit" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-semibold text-lg transition">Pay $49.99</button>
      <p class="text-center text-gray-500 text-xs">Secure payment. Cancel anytime for subscriptions.</p>
    </form>
  </main>
</body>
</html>
